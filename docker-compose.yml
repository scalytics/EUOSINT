services:
  browser:
    container_name: euosint-browser
    image: ghcr.io/browserless/chromium:latest
    environment:
      PREBOOT_CHROME: "true"
      MAX_CONCURRENT_SESSIONS: "${BROWSER_MAX_CONCURRENCY:-4}"
      CONNECTION_TIMEOUT: "60000"
      HEALTH: "true"
      EXIT_ON_HEALTH_FAILURE: "true"
    init: true
    shm_size: 1gb
    restart: unless-stopped

  collector:
    image: "${EUOSINT_COLLECTOR_IMAGE:-ghcr.io/scalytics/euosint-collector:latest}"
    build:
      context: .
      dockerfile: Dockerfile.collector
    env_file:
      - .env
    command:
      - --watch
      - --api
      - --api-addr
      - ":3001"
      - --registry
      - /data/sources.db
      - --registry-seed
      - /app/registry/source_registry.json
      - --output
      - /data/alerts.json
      - --filtered-output
      - /data/alerts-filtered.json
      - --state-output
      - /data/alerts-state.json
      - --source-health-output
      - /data/source-health.json
      - --zone-briefings-output
      - /data/zone-briefings.json
      - --candidate-queue
      - /data/source_candidates.json
      - --replacement-queue
      - /data/source_dead_letter.json
    environment:
      GEONAMES_PATH: "/app/registry/cities500.txt"
      NOMINATIM_ENABLED: "1"
      DDG_SEARCH_ENABLED: "1"
      DDG_SEARCH_DELAY_MS: "8000"
      BROWSER_ENABLED: "${BROWSER_ENABLED:-1}"
      BROWSER_WS_URL: "${BROWSER_WS_URL:-ws://browser:3000}"
      BROWSER_MAX_CONCURRENCY: "${BROWSER_MAX_CONCURRENCY:-4}"
      BROWSER_CONNECT_RETRIES: "${BROWSER_CONNECT_RETRIES:-3}"
      BROWSER_CONNECT_RETRY_DELAY_MS: "${BROWSER_CONNECT_RETRY_DELAY_MS:-1000}"
      FETCH_TIMEOUT_FAST_MS: "3000"
      FETCH_WORKERS: "12"
      HTTP_TIMEOUT_MS: "10000"
      INTERVAL_MS: "900000"
      MAX_PER_SOURCE: "40"
      RECENT_WINDOW_PER_SOURCE: "20"
      HTML_SCRAPE_INTERVAL_HOURS: "24"
      ALERT_COOLDOWN_HOURS: "24"
      ALERT_STALE_DAYS: "14"
      ALERT_ARCHIVE_DAYS: "90"
      REMOVED_RETENTION_DAYS: "14"
      CURSORS_PATH: "/data/cursors.json"
      WIKIDATA_CACHE_PATH: "/data/wikidata_cache"
      STRUCTURED_DISCOVERY_INTERVAL_HOURS: "${STRUCTURED_DISCOVERY_INTERVAL_HOURS:-168}"
      CATEGORY_DICTIONARY_PATH: "/app/registry/category_dictionary.json"
      STOP_WORDS_PATH: "/app/registry/stop_words.json"
      NOISE_POLICY_PATH: "${NOISE_POLICY_PATH:-/app/registry/noise_policy.json}"
      NOISE_POLICY_B_PATH: "${NOISE_POLICY_B_PATH:-/app/registry/noise_policy_b.json}"
      NOISE_POLICY_B_PERCENT: "${NOISE_POLICY_B_PERCENT:-0}"
      NOISE_METRICS_OUTPUT_PATH: "${NOISE_METRICS_OUTPUT_PATH:-/data/noise-metrics.json}"
      ZONE_BRIEFINGS_TTL_HOURS: "${ZONE_BRIEFINGS_TTL_HOURS:-168}"
      MISSING_PERSON_RELEVANCE_THRESHOLD: "0"
      SOURCE_VETTING_REQUIRED: "${SOURCE_VETTING_REQUIRED:-1}"
      SOURCE_MIN_QUALITY: "${SOURCE_MIN_QUALITY:-0.6}"
      SOURCE_MIN_OPERATIONAL_RELEVANCE: "${SOURCE_MIN_OPERATIONAL_RELEVANCE:-0.6}"
      ALARM_RELEVANCE_THRESHOLD: "${ALARM_RELEVANCE_THRESHOLD:-0.72}"
      FAIL_ON_CRITICAL_SOURCE_GAP: "0"
      CRITICAL_SOURCE_PREFIXES: "interpol-red,interpol-yellow"
    volumes:
      - feed-data:/data
    depends_on:
      - browser
    init: true
    restart: unless-stopped

  euosint:
    image: "${EUOSINT_WEB_IMAGE:-ghcr.io/scalytics/euosint-web:latest}"
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - collector
    env_file:
      - .env
    environment:
      EUOSINT_SITE_ADDRESS: "${EUOSINT_SITE_ADDRESS:-:80}"
    ports:
      - "${EUOSINT_HTTP_PORT:-8080}:80"
      - "${EUOSINT_HTTPS_PORT:-8443}:443"
    volumes:
      - feed-data:/var/lib/euosint:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  feed-data:
  caddy-data:
  caddy-config:
