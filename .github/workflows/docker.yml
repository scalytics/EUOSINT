name: Docker

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - ".github/workflows/docker.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker/**"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
