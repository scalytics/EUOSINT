name: Docker

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "Dockerfile.collector"
      - "docker-compose.yml"
      - "docker/**"
      - "cmd/**"
      - "internal/**"
      - "registry/**"
      - "go.mod"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - ".github/workflows/docker.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.collector"
      - "docker-compose.yml"
      - "docker/**"
      - "cmd/**"
      - "internal/**"
      - "registry/**"
      - "go.mod"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            dockerfile: Dockerfile
          - name: collector
            dockerfile: Dockerfile.collector
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.image.dockerfile }}
          push: false
          load: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
