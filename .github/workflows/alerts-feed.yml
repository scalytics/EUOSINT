name: Update alerts feed

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: alerts-feed
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: refresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch alerts with parity reference collector
        run: node scripts/fetch-alerts.mjs
        env:
          MAX_PER_SOURCE: "20"
          OUTPUT_PATH: "public/alerts.json"
          FILTERED_OUTPUT_PATH: "public/alerts-filtered.json"
          STATE_OUTPUT_PATH: "public/alerts-state.json"
          SOURCE_HEALTH_OUTPUT_PATH: "public/source-health.json"
          MISSING_PERSON_RELEVANCE_THRESHOLD: "0"
          FAIL_ON_CRITICAL_SOURCE_GAP: "0"
          CRITICAL_SOURCE_PREFIXES: "interpol-red,interpol-yellow"

      - name: Commit updates
        run: |
          if git diff --quiet -- public/alerts.json public/alerts-filtered.json public/alerts-state.json public/source-health.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "euosint-bot"
          git config user.email "euosint-bot@users.noreply.github.com"
          git add public/alerts.json public/alerts-filtered.json public/alerts-state.json public/source-health.json
          git commit -m "chore: update alerts feed"
          git push
